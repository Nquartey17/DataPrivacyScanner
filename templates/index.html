<link
  href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
  rel="stylesheet"
  id="bootstrap-css"
/>
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Data Privacy Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Script runs before jquery, adding defer to let jquery run first  -->
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>

<body>
<div class="wrapper">
  <header>
    <nav>
      <div class="menu-icon">
        <i class="fa fa-bars fa-2x"></i>
      </div>
      <div class="logo">Data Privacy Scanner</div>
      <div class="menu">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Blog</a></li>
        </ul>
      </div>
    </nav>
  </header>
</div>

<h1>Data Privacy Scanner</h1>
<form action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
  <label>Select a file:</label>
  <input type="file"  name="test">

  <h4>PII</h4>

  <div class="dropdown" data-control="checkbox-dropdown">
    <label class="dropdown-label">Select</label>

    <div class="dropdown-list">

      <a href="#" data-toggle="check-all" class="dropdown-option">
        Select All
      </a>

      <label class="dropdown-option">
        <input type="checkbox" name="pii_dropdown" value="dl" />
        Driver’s license
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="pii_dropdown" value="sid" />
        State ID
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="pii_dropdown" value="a_num" />
        Alien registration number
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="pii_dropdown" value="passport" />
        Passport
      </label>
    </div>
  </div>

  <br><br>
   <h4>PHI</h4>

  <div class="dropdown" data-control="checkbox-dropdown">
    <label class="dropdown-label">Select</label>

    <div class="dropdown-list">

      <a href="#" data-toggle="check-all" class="dropdown-option">
        Select All
      </a>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="hx" />
        Medical History
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="tx" />
        Treatment
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="dx" />
        Diagnosis
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="rx" />
        Prescription/Medication
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="lab" />
        Lab Results
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="phys" />
        Reffering/Attending Physician
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="mrn" />
        Medical Record Number
      </label>

      <label class="dropdown-option">
        <input type="checkbox" name="phi_dropdown" value="pid" />
        Patient ID
      </label>


    </div>
  </div>
  <button type="submit">Upload</button>
</form>

</body>
</html>
