<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Privacy Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Script runs before jquery, adding defer to let jquery run first  -->
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>



</head>
<body>

<h1>Data Privacy Scanner</h1>
<form action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
  <label type="file" name="test">Select a file:</label>
  <input type="file"  name="test">
  <button type="submit">Upload</button>
</form>

<h4>PII</h4>
<div class="dropdown" data-control="checkbox-dropdown">
  <label class="dropdown-label">Select</label>

  <div class="dropdown-list">
    <a href="#" data-toggle="check-all" class="dropdown-option">
      Select All
    </a>

    <label class="dropdown-option">
      <input type="checkbox" name="dropdown-group" value="Opt 1" />
      Driver’s license
    </label>

    <label class="dropdown-option">
      <input type="checkbox" name="dropdown-group" value="Opt 2" />
      State ID
    </label>

    <label class="dropdown-option">
      <input type="checkbox" name="dropdown-group" value="Opt 3" />
      Alien registration number
    </label>

    <label class="dropdown-option">
      <input type="checkbox" name="dropdown-group" value="Opt 4" />
      Non-US ID
    </label>

    <label class="dropdown-option">
      <input type="checkbox" name="dropdown-group" value="Opt 5" />
      Passport
    </label>
  </div>
</div>

</body>
</html>
